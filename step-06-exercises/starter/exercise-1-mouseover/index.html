<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 1 — Hover cards (STARTER)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Hover over the cards</h1>
  <p>When the mouse enters a card, add the class <code>active</code>.
     When the mouse leaves, remove it.</p>

  <!--
    TODO: Add onmouseover and onmouseout to EACH card.
    Hint: onmouseover="this.classList.add('active')"
          onmouseout ="this.classList.remove('active')"
    `this` refers to the element the event is on.
  --> <div class onmouseover="this.classList.add('active')">Card 1</div>
      <div class onmouseout ="this.classList.remove('active')">Card 1</div>

      <div class onmouseover="this.classList.add('active')">Card 2</div>
      <div class onmouseout ="this.classList.remove('active')">Card 2</div>

      <div class onmouseover="this.classList.add('active')">Card 3</div>
      <div class onmouseout ="this.classList.remove('active')">Card 3</div>

      <div class onmouseover="this.classList.add('active')">Card 4</div>
      <div class onmouseout ="this.classList.remove('active')">Card 4</div>

  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
  <div class="card">Card 4</div>
</body>
</html>
