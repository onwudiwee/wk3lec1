<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Step 8 — querySelectorAll + forEach</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>One JavaScript loop, many cards</h1>

  <p>Hover over any card. The behaviour is written ONCE in JS — it applies to every card.</p>

  <!-- Six cards. Notice: no onmouseover, no inline JS, no ids on the cards. -->
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
  <div class="card">Card 4</div>
  <div class="card">Card 5</div>
  <div class="card">Card 6</div>

  <p>
    <em>Add another &lt;div class="card"&gt; to the HTML and reload — it works
       automatically. The JS doesn't care how many cards there are.</em>
  </p>

  <script src="script.js"></script>
</body>
</html>
